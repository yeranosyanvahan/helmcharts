{{- $secrets := list}}
{{- if kindIs "map" .Values.secret -}}
 {{- $secrets = append $secrets .Values.secret  }}
{{- else if kindIs "slice" .Values.secret }}
 {{- $secrets = .Values.secret }}
{{- end}}

{{- range $secrets }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ $.Values.namespace }}
  name: {{ .name }}
{{- if .type }}
type: {{ .type }}
{{- else }}
type: Opaque
{{- end }}
stringData: {{ .data | toYaml | nindent 1 }}
---
{{- end}}
