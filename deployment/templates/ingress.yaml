{{- if .Values.ingress -}}
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.ingress.name }}
  {{- if .Values.ingress.middlewares }}
  {{- $middlewares := list }}
  {{- range $middleware := .Values.ingress.middlewares }}
   {{- $middleware := print $.Values.namespace "-" $middleware "@kubernetescrd"  }}
   {{- $middlewares = append $middlewares $middleware  }}
  {{- end}}
  annotations:
    "traefik.ingress.kubernetes.io/router.middlewares": {{ $middlewares | join ", "  }}
  {{- end}}
spec:
  tls:
    {{- if .Values.ingress.tls_secret }}
    {{- range .Values.ingress.hosts }}
    - hosts:
      - {{ .hostname }}
      secretName: {{ $.Values.ingress.tls_secret }}
    {{- end}} {{- end}}
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .hostname }}
    http:
      paths:
      - backend:
          service:
            name: {{ .forwardhost }}
            port:
              number: {{ .forwardport }}
        path: /
        pathType: Prefix
  {{- end}}
{{- end}}
